<!DOCTYPE html>
<html>
  <head>
    <title>Poppy VR - One Hand Edition</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="floorTexture" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
      </a-assets>

      <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" src="#floorTexture"></a-plane>
      <a-sky color="#111"></a-sky> <a-entity id="rig">
        <a-camera position="0 1.6 0"></a-camera>
        <a-entity oculus-touch-controls="hand: right" laser-controls="hand: right" raycaster="objects: .interactable; far: 5">
          <a-box position="0 0 -0.1" scale="0.1 0.1 0.2" color="blue"></a-box>
        </a-entity>
      </a-entity>

      <a-box class="interactable" position="0 1 -3" color="red" 
             animation__click="property: position; to: 0 1.5 -3; startEvents: click">
      </a-box>

    </a-scene>
  </body>
</html>
